<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matricula</title>
    <link rel="stylesheet" href="style/global.css">
</head>
<body>
    
    <div class="container">
    <main>
         <div class="content-header">
        <div class="container_header">
        <div class="lado_A ">
            <img src="imagens/angulo-esquerdo.png" alt="">
        </div>
        <div class="lado_B"> voltar</div>
        </div>
        <h1> Formulario de matricula</h1>
        <p>Preencha os dados de matricula do seu filho</p>
      </div>

       <div class="container_main">
            <form>
                <h3>informação da criança</h3>
                <p>nome completo</p>
                <input type="text" placeholder="digite o nome completo da sua filha"
                class="barra"
                > 
            </form>

            <form>
                <p>Data de nascimento</p>
                <input type="date"
                 class="barra"
                 placeholder="Insira o dia do nascimento do se filho"
                 >

            </form>
            <p>Qual o sexo do seu filho(a)</p>
            <select class="barra">
               <option value="Sexo"> Selecione</option>
               <option value="Sexo">Masculino</option>
               <option value="Sexo">Feminino</option>
               <option value="Sexo"> Transfomers</option>
            </select>
            <p>Informações medicas</p>
            <form>
              <textarea name="info-medicas" class="text-area">
              </textarea>
            </form>

            <p>Certidão de nascimento</p>
            <form class="envio-arquivo bordar">
                <div>
                    <input type="file" >
                    <img src="imagens/carregar.png" alt="" srcset="">
                    <p>Clique para selecionar arquivo </p>
                </div>
            </form>

            <section>
                <h4>Endereço residencial</h4>
            </section>

            <div class="cep">
                <form>
                    <input type="number"
                    class="barra"
                    placeholder="digite seu cep">
                </form>
                
                <div class="flex"></div>

                <div class="flex"></div>

            </div>




        </div>
        
           </main>

           <div class="container-esquerdo">
        <img src="https://wallpapers.com/images/hd/spider-man-into-the-spider-verse-4k-h8rz5175kd8vujoc.jpg" alt="">

           </div>

   



    </div>
    
</body>
</html>
