<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="title"> 
            <h1>CONVERT</h1>
        </div>

        <div class="central">
            <div class="campo">
                <label>VALOR</label>
                <input type="number" placeholder="0" class="input-valor">
            </div>

            <div class="campo">
                <label>MOEDA</label>
                <select class="select-moeda">
                    <option value="" disabled selected>Selecione a moeda</option>
                    <option value="usd">Dólar Americano</option>
                    <option value="eur">Euro</option>
                    <option value="btc">Bitcoin</option>
                </select>
            </div>

            <button class="btn-converter">Converter em reais</button>
        </div>
     </div>
</body>
</html>
