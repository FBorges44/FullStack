<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LN_DARK_PROTOCOL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="frame-border top"></div>
<div class="frame-border bottom"></div>

<header class="main-nav">
    <div class="brand">LN // <span>DARK</span></div>
    <div class="nav-links">
        <span>01_SPEC</span>
        <span>02_GARAGE</span>
        <span>03_INTEL</span>
    </div>
</header>

<main class="grid-layout">
    <section class="hero-module">
        <div class="reveal-container" id="reveal-area">
            <div class="layer layer-batman"><img src="traje-batman.jpg"></div>
            <div class="layer layer-user"><img src="eu.jpg"></div>
        </div>
        <div class="hero-label">
            <h1 class="main-title">SHADOW<br>STARK</h1>
            <p class="tagline">// RACING THROUGH THE DARKNESS</p>
        </div>
    </section>

    <section class="info-module">
        <div class="data-box">
            <span class="index">01</span>
            <span class="label">AERODYNAMICS</span>
            <span class="value">98.2% DRAG REDUCTION</span>
        </div>
        <div class="data-box">
            <span class="index">02</span>
            <span class="label">BIO_ENCRYPTION</span>
            <span class="value">UMBRELLA_PROTOCOL_ACTIVE</span>
        </div>
        <div class="data-box">
            <span class="index">03</span>
            <span class="label">ENGINE_MAP</span>
            <span class="value">V10_HYBRID_OS</span>
        </div>
    </section>

    <footer class="terminal-footer">
        <div class="scrolling-text">
            SYSTEM_OVERRIDE > ACCESSING GOTHAM_SATELLITE > T-VIRUS_ISOLATED > LAP_TIME: 1:14.302 > 
        </div>
    </footer>
</main>

<script src="script.js"></script>
</body>
</html>
