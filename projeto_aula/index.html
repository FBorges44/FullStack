<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Mural de Virtualização - Grupo 03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Ciberespaço de Aprendizagem</h1>

    <script src="script.js"></script>
